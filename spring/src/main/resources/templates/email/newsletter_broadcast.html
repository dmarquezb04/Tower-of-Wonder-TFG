<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${subject}">Newsletter - Tower of Wonder</title>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            color: #2b2b2b;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #2b1b3a 0%, #1f1628 100%);
            padding: 30px 20px;
            text-align: center;
            color: #f5eddc;
        }
        .header h1 {
            font-family: 'Cinzel', serif;
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            color: #c6a156;
        }
        .content {
            padding: 30px;
            line-height: 1.6;
        }
        .footer {
            background-color: #f8fafc;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #a0aec0;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(180deg, #b88628 0%, #8a5f1a 100%);
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
        }
        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TOWER OF WONDER</h1>
        </div>
        <div class="content">
            <!-- El contenido se inyecta como HTML sin escapar para permitir formato básico si se desea -->
            <div th:utext="${content}"></div>
            
            <div class="divider"></div>
            
            <p>¡Gracias por ser parte de nuestra comunidad!</p>
            
            <center>
                <a th:href="${baseUrl + '/'}" class="btn">Visitar el Sitio Oficial</a>
            </center>
        </div>
        <div class="footer">
            <p>&copy; <span th:text="${#calendars.year(#calendars.createNow())}">2026</span> Tower of Wonder — Todos los derechos reservados.</p>
            <p style="margin-top: 10px;">Estás recibiendo este correo porque estás suscrito a nuestra newsletter.</p>
            <p><a th:href="${unsubscribeLink}" style="color: #a0aec0; text-decoration: underline;">Darse de baja de la lista</a></p>
        </div>
    </div>
</body>
</html>
