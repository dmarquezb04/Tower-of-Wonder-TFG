<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo mensaje de contacto - Tower of Wonder</title>
    <style>
        body { font-family: 'Inter', Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; color: #2b2b2b; }
        .container { max-width: 600px; margin: 20px auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #2b1b3a 0%, #1f1628 100%); padding: 30px; text-align: center; color: #c6a156; }
        .header h1 { font-family: 'Cinzel', serif; margin: 0; font-size: 24px; letter-spacing: 2px; }
        .content { padding: 30px; }
        .field { margin-bottom: 15px; border-bottom: 1px solid #edf2f7; padding-bottom: 10px; }
        .label { font-weight: bold; color: #4a5568; font-size: 14px; text-transform: uppercase; }
        .value { font-size: 16px; margin-top: 5px; }
        .message-box { background-color: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; white-space: pre-wrap; margin-top: 10px; }
        .footer { background-color: #f8fafc; padding: 20px; text-align: center; font-size: 12px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NUEVO MENSAJE DE CONTACTO</h1>
        </div>
        <div class="content">
            <div class="field">
                <div class="label">Nombre del remitente</div>
                <div class="value" th:text="${nombre}">Nombre</div>
            </div>
            <div class="field">
                <div class="label">Email de contacto</div>
                <div class="value" th:text="${email}">email@ejemplo.com</div>
            </div>
            <div class="field">
                <div class="label">Asunto</div>
                <div class="value" th:text="${asunto}">Asunto del mensaje</div>
            </div>
            <div class="field">
                <div class="label">Mensaje</div>
                <div class="message-box" th:text="${mensaje}">Contenido del mensaje...</div>
            </div>
        </div>
        <div class="footer">
            <p>Este es un mensaje automático generado por el sistema de contacto de Tower of Wonder.</p>
        </div>
    </div>
</body>
</html>
