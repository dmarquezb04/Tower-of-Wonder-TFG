# application-test.yml — Configuración para tests unitarios
# Activo cuando @ActiveProfiles("test") está en el test
spring:
  datasource:
    # H2 en memoria — no necesita MariaDB real para los tests
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop  # Crea tablas al inicio, las elimina al acabar
    database-platform: org.hibernate.dialect.H2Dialect
  mail:
    host: localhost
    port: 25
