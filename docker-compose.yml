services:

  # ============================================================
  # NGINX — Proxy inverso y servidor de archivos estáticos
  # Puerto 8080 del host → 80 del contenedor
  # Rutas:
  #   /api/**  → spring:8080 (Spring Boot)
  #   /auth/** → php:9000   (PHP legacy, temporal durante migración)
  #   /*       → /var/www/html/public (PHP, temporal)
  # ============================================================
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./php:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - spring
    networks:
      - app_network

  # ============================================================
  # PHP — Backend legacy (se mantiene durante la migración)
  # Se irá eliminando módulo por módulo conforme Spring lo reemplaza.
  # ⚠️ NO ELIMINAR hasta completar la migración.
  # ============================================================
  php:
    build: ./php
    volumes:
      - ./php:/var/www/html
    env_file:
      - .env
    networks:
      - app_network

  # ============================================================
  # SPRING BOOT — Nuevo backend API REST
  # Puerto 8090 del host → 8080 del contenedor
  # Puerto 8090 expuesto para acceso directo (debug, Swagger UI)
  #
  # Build multi-stage: Maven compila dentro del contenedor.
  # NO necesitas Maven instalado localmente.
  # ============================================================
  spring:
    build:
      context: ./spring
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app_network
    # Espera a que MariaDB esté disponible antes de arrancar
    # Spring Boot reintentará la conexión si falla al inicio
    restart: on-failure

  # ============================================================
  # MARIADB — Base de datos (compartida entre PHP y Spring Boot)
  # ============================================================
  db:
    image: mariadb:10.6
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network

  # ============================================================
  # PHPMYADMIN — Interfaz web de administración de BD
  # Accesible en: http://localhost:8081
  # ============================================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - app_network

  # ============================================================
  # NODE — Herramienta de build del frontend React (one-shot)
  #
  # No arranca como servicio permanente (no tiene 'ports' ni 'restart').
  # Se usa con: docker compose run --rm node <comando>
  #
  # Ejemplos:
  #   docker compose run --rm node npm install
  #   docker compose run --rm node npm run build
  # ============================================================
  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./php:/php    # necesario para que el build escriba en /php/public/assets/dist
    networks:
      - app_network
    profiles:
      - tools   # Solo se activa si se llama explícitamente — no interfiere con 'up'



volumes:
  db_data:

networks:
  app_network: