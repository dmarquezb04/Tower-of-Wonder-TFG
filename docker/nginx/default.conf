server {
    listen 80;
    server_name localhost;

    # ================================================================
    # SPRING BOOT — API REST
    # Todas las peticiones a /api/** van al contenedor spring:8080
    # Spring Boot tiene context-path=/api configurado en application.yml
    # ================================================================
    location /api/ {
        proxy_pass http://spring:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para el build inicial de Spring Boot
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ================================================================
    # FRONTEND — React SPA
    # Sirve los archivos estáticos de React desde /usr/share/nginx/html
    # ================================================================
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # try_files intenta servir el archivo real ($uri).
        # Si no existe, asume que es una ruta de React Router y devuelve index.html.
        try_files $uri $uri/ /index.html;
    }

    # Denegar acceso a archivos ocultos
    location ~ /\.ht {
        deny all;
    }
}