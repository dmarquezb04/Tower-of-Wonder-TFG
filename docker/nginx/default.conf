server {
    listen 80;
    server_name localhost;

    # API Proxy
    location /api/ {
        proxy_pass http://spring:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Swagger UI & API Docs (proxied to /api/...)
    location /swagger-ui.html {
        proxy_pass http://spring:8080/api/swagger-ui.html;
    }

    location /swagger-ui/ {
        proxy_pass http://spring:8080/api/swagger-ui/;
    }

    location /v3/api-docs {
        proxy_pass http://spring:8080/api/api-docs;
    }

    location /api-docs {
        proxy_pass http://spring:8080/api/api-docs;
    }

    # Javadoc (proxied to /api/docs/javadoc/...)
    location /docs/javadoc/ {
        proxy_pass http://spring:8080/api/docs/javadoc/;
    }

    # Static files (React SPA)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # try_files intenta servir el archivo real ($uri).
        # Si no existe, asume que es una ruta de React Router y devuelve index.html.
        try_files $uri $uri/ /index.html;
    }

    # Denegar acceso a archivos ocultos
    location ~ /\.ht {
        deny all;
    }
}