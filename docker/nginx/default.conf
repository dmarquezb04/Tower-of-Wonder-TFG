server {
    listen 80;
    server_name localhost;

    # ================================================================
    # SPRING BOOT — API REST
    # Todas las peticiones a /api/** van al contenedor spring:8080
    # Spring Boot tiene context-path=/api configurado en application.yml
    # ================================================================
    location /api/ {
        proxy_pass http://spring:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para el build inicial de Spring Boot
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ================================================================
    # PHP LEGACY — Resto de rutas (temporal durante migración)
    # Sirve los archivos PHP en /var/www/html/public
    # ================================================================
    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}